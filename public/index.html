<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務總覽 — Alex & Tiffany</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fdf6f0;--bg2:#fff8f3;--bg3:#ffeee4;--card:#ffffff;--border:#f0d9cc;
  --accent:#e8845a;--accent2:#5b9bd5;--accent3:#e8a23a;--red:#e06b7a;--green:#6ab070;
  --text:#3d2b1f;--text2:#8a6655;--text3:#b89485;
  --font-d:'Noto Serif TC',serif;--font-b:'Sora',sans-serif;--font-m:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;min-height:100vh;line-height:1.6}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(232,132,90,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(232,132,90,.06) 1px,transparent 1px);
  background-size:40px 40px}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:40px 24px 80px}
.sec{font-family:var(--font-m);font-size:11px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.htag{display:inline-block;font-family:var(--font-m);font-size:11px;color:var(--accent);background:rgba(232,132,90,.1);border:1px solid rgba(232,132,90,.25);padding:4px 12px;border-radius:20px;letter-spacing:.1em;margin-bottom:10px}

/* Nav tabs */
.nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px}
.nav-btn{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font-b);transition:all .15s}
.nav-btn.active{background:rgba(232,132,90,.1);color:var(--accent);font-weight:600}
.nav-btn:hover{background:rgba(232,132,90,.06)}

/* Section visibility */
.section{display:none}
.section.active{display:block}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Stat cards */
.stat{text-align:center;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-family:var(--font-m)}
.stat-val{font-size:22px;font-weight:600;font-family:var(--font-m)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--font-m)}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--font-m)}
.tbl th{color:var(--text3);font-weight:400;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(240,217,204,.5);color:var(--text2)}
.tbl td:first-child{color:var(--text);font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.tbl tfoot td{border-top:2px solid var(--border);font-weight:600;color:var(--text)}
.tbl .right{text-align:right}

/* Tags */
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:12px;font-family:var(--font-m)}
.tag-income{background:rgba(106,176,112,.12);color:#4a8a50}
.tag-expense{background:rgba(224,107,122,.12);color:#c4556a}
.tag-default{background:rgba(138,102,85,.08);color:var(--text2)}

/* Stock cards */
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.sp{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.sp::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sp.c0::before{background:#e8845a}.sp.c1::before{background:#5b9bd5}
.sp.c2::before{background:#e8a23a}.sp.c3::before{background:#e06b7a}
.sp.c4::before{background:#7cb87c}.sp.c5::before{background:#9b7ec8}
.sp-name{font-family:var(--font-m);font-size:14px;font-weight:600;margin-bottom:2px}
.sp-market{font-size:11px;color:var(--text3);margin-bottom:10px}
.sp-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-family:var(--font-m)}
.sp-row .k{color:var(--text3)}.sp-row .v{color:var(--text2)}
.sp-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.profit-pos{color:var(--green)}.profit-neg{color:var(--red)}

/* Chart */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.chart-wrap canvas{max-height:300px}

/* Hero */
.hero{background:linear-gradient(135deg,rgba(232,132,90,.07),rgba(91,155,213,.05));border:1px solid rgba(232,132,90,.25);border-radius:16px;padding:24px 28px;margin-bottom:16px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center}
@media(max-width:600px){.hero-grid{grid-template-columns:1fr}}
.hero-val{font-family:var(--font-d);font-size:28px;font-weight:700;line-height:1.1}
.hero-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-family:var(--font-m)}
.hero-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--font-m)}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-family:var(--font-m)}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Simulation inputs */
.sim-inputs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:760px){.sim-inputs{grid-template-columns:1fr 1fr}}
.sim-inputs label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;font-family:var(--font-m)}
.sim-inputs input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-m);font-size:14px;padding:8px 10px;outline:none}
.sim-inputs input:focus{border-color:var(--accent)}

.fn{font-size:11px;color:var(--text3);text-align:center;margin-top:20px;font-family:var(--font-m);line-height:1.9}

/* Gauge cards */
.gauge-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.gauge-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.gauge-header .icon{font-size:28px}
.gauge-header .title{font-family:var(--font-m);font-size:12px;color:var(--text3);letter-spacing:.08em}
.gauge-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.gauge-stat-label{font-size:10px;color:var(--text3);font-family:var(--font-m);margin-bottom:2px}
.gauge-stat-val{font-size:18px;font-weight:600;font-family:var(--font-m)}
.gauge-scene{position:relative;height:120px;border-radius:10px;overflow:hidden}
.gauge-scene-mountain{background:linear-gradient(180deg,#e8f4ea 0%,#c8e6c9 40%,#81c784 70%,#4caf50 100%)}
.gauge-scene-ocean{background:linear-gradient(180deg,#e3f2fd 0%,#90caf9 30%,#42a5f5 60%,#1565c0 100%)}
.gauge-level{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;transition:height .5s ease}
.gauge-person{font-size:36px;position:absolute;z-index:2;transition:bottom .5s ease}
.gauge-bar{position:absolute;bottom:0;left:0;right:0;opacity:.25;border-radius:8px 8px 0 0}
.gauge-bar-income{background:var(--green)}
.gauge-bar-expense{background:var(--red)}
.gauge-avg-line{position:absolute;left:0;right:0;height:2px;border-top:2px dashed rgba(0,0,0,.25);z-index:3}
.gauge-avg-label{position:absolute;right:6px;font-size:9px;font-family:var(--font-m);color:rgba(0,0,0,.4);transform:translateY(-12px)}
.gauge-pct{text-align:center;margin-top:8px;font-family:var(--font-m);font-size:12px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">

<!-- Header -->
<header style="margin-bottom:20px">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
    <img src="/pig-logo.png" alt="Logo" style="width:64px;height:64px;border-radius:12px;object-fit:cover">
    <div>
      <div class="htag">FINANCE DASHBOARD // ALEX & TIFFANY</div>
      <h1 style="font-family:var(--font-d);font-size:26px;font-weight:700">財務總覽 Dashboard</h1>
      <p style="color:var(--text2);font-size:13px">收支追蹤 x 股票資產 x 財富預測 — 自動同步 Notion</p>
    </div>
  </div>
</header>

<!-- Sync bar -->
<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:16px;flex-wrap:wrap;gap:8px">
  <span id="sync-status" style="font-family:var(--font-m);font-size:12px;color:var(--text3)">正在從 Notion 讀取資料...</span>
  <button id="sync-btn" onclick="syncAll()" style="font-family:var(--font-b);font-size:12px;padding:5px 16px;border-radius:8px;border:1px solid rgba(232,132,90,.4);background:rgba(232,132,90,.08);color:var(--accent);cursor:pointer">重新同步</button>
</div>

<!-- Navigation -->
<nav class="nav">
  <button class="nav-btn active" onclick="showSection('overview',this)">總覽</button>
  <button class="nav-btn" onclick="showSection('income',this)">收入</button>
  <button class="nav-btn" onclick="showSection('expenses',this)">支出</button>
  <button class="nav-btn" onclick="showSection('stocks',this)">股票資產</button>
  <button class="nav-btn" onclick="showSection('simulation',this)">財富預測</button>
</nav>

<!-- Loading -->
<div id="loading" class="loading"><div class="spin"></div><br>正在載入 Notion 資料...</div>

<!-- ===================== 總覽 ===================== -->
<div id="sec-overview" class="section">
  <!-- Hero stats -->
  <div class="hero">
    <div class="hero-grid" id="heroStats"></div>
  </div>

  <!-- Monthly trend chart -->
  <div class="chart-wrap">
    <div class="sec">每月收支趨勢</div>
    <canvas id="monthlyChart"></canvas>
  </div>

  <!-- Net savings chart -->
  <div class="chart-wrap">
    <div class="sec">累積基金餘額</div>
    <canvas id="cumChart"></canvas>
  </div>

  <!-- Monthly gauge -->
  <div class="g2" id="monthlyGauge"></div>
</div>

<!-- ===================== 收入 ===================== -->
<div id="sec-income" class="section">
  <div class="g4" id="incomeStats"></div>
  <div class="g2">
    <div class="chart-wrap">
      <div class="sec">收入分類</div>
      <canvas id="incomeByTagChart"></canvas>
    </div>
    <div class="chart-wrap">
      <div class="sec">每月收入趨勢</div>
      <canvas id="incomeMonthlyChart"></canvas>
    </div>
  </div>
  <div class="card" id="incomeCategoryProgress"></div>
  <div class="card">
    <div class="sec">所有收入記錄</div>
    <div style="max-height:400px;overflow-y:auto">
      <table class="tbl" id="incomeTable"></table>
    </div>
  </div>
</div>

<!-- ===================== 支出 ===================== -->
<div id="sec-expenses" class="section">
  <div class="g4" id="expenseStats"></div>
  <div class="g2">
    <div class="chart-wrap">
      <div class="sec">支出分類</div>
      <canvas id="expenseByTagChart"></canvas>
    </div>
    <div class="chart-wrap">
      <div class="sec">每月支出趨勢</div>
      <canvas id="expenseMonthlyChart"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="sec">所有支出記錄</div>
    <div style="max-height:400px;overflow-y:auto">
      <table class="tbl" id="expenseTable"></table>
    </div>
  </div>
</div>

<!-- ===================== 股票 ===================== -->
<div id="sec-stocks" class="section">
  <div class="g4" id="stockStats"></div>
  <div class="stock-grid" id="stockCards"></div>
  <div class="card">
    <div class="sec">買進記錄</div>
    <div style="max-height:400px;overflow-y:auto">
      <table class="tbl" id="purchaseTable"></table>
    </div>
  </div>
</div>

<!-- ===================== 財富預測 ===================== -->
<div id="sec-simulation" class="section">
  <div class="card">
    <div class="sec">模擬設定</div>
    <div class="sim-inputs">
      <div><label>目標財富（萬元）</label><input type="number" id="sim-goal" value="500" step="50"></div>
      <div><label>期望年限</label><input type="number" id="sim-yrs" value="10" step="1" min="1" max="40"></div>
      <div><label>每月淨存入</label><input type="number" id="sim-save" value="16000" step="500"></div>
      <div><label>目前現金</label><input type="number" id="sim-cash" value="325000" step="1000"></div>
    </div>
  </div>

  <div id="simStockInputs"></div>

  <!-- Simulation results -->
  <div class="hero" id="simHero" style="display:none"></div>

  <div class="chart-wrap" id="simChartWrap" style="display:none">
    <div class="sec">資產成長曲線</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="nav-btn active" onclick="setSimView('total',event)">總資產</button>
      <button class="nav-btn" onclick="setSimView('stock',event)">存股市值</button>
      <button class="nav-btn" onclick="setSimView('divMonthly',event)">每月配息</button>
      <button class="nav-btn" onclick="setSimView('cash',event)">現金</button>
    </div>
    <canvas id="simChart"></canvas>
  </div>

  <div class="card" id="simBreakdown" style="display:none">
    <div class="sec">財富分解</div>
    <table class="tbl" id="simTable"></table>
  </div>
</div>

<div class="fn">
  資料來源：Notion ❤️❤️基金<br>
  股票預測僅供參考，實際報酬因市況而異，不構成投資建議
</div>
</div>

<script>
// ── 全域變數 ──
let DATA = null;
let charts = {};
let simChartInst = null;
let simView = 'total';
let simData = {};

// ── 工具函式 ──
function fmtNT(n) {
  if (n == null || isNaN(n)) return 'NT$0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 10000000) return sign + 'NT$' + (abs/10000).toFixed(0) + '萬';
  if (abs >= 10000) return sign + 'NT$' + (abs/10000).toFixed(1) + '萬';
  return sign + 'NT$' + Math.round(abs).toLocaleString('zh-TW');
}
function fmtNum(n) {
  if (n == null || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('zh-TW');
}
function trimmedAvg(arr) {
  const s = arr.filter(v => v > 0).sort((a, b) => a - b);
  if (s.length <= 2) return s[0] || 0;
  const trimmed = s.slice(0, -2); // 排除最高2個月
  return Math.round(trimmed.reduce((a, b) => a + b, 0) / trimmed.length);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '0%';
  return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
}

// ── 導航 ──
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'simulation' && DATA) updateSimulation();
}

// ── 同步 Notion ──
async function syncAll() {
  const statusEl = document.getElementById('sync-status');
  const btn = document.getElementById('sync-btn');
  statusEl.textContent = '同步中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/notion');
    if (!res.ok) throw new Error('API 錯誤 ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    DATA = data;
    renderAll();
    const t = new Date(data.fetchedAt).toLocaleString('zh-TW');
    statusEl.textContent = `已同步（${t}）`;
    statusEl.style.color = 'var(--accent)';
  } catch (e) {
    statusEl.textContent = '同步失敗：' + e.message;
    statusEl.style.color = 'var(--red)';
  }
  btn.disabled = false;
  document.getElementById('loading').style.display = 'none';
}

// ── 主渲染 ──
function renderAll() {
  renderOverview();
  renderIncome();
  renderExpenses();
  renderStocks();
  document.getElementById('sec-overview').classList.add('active');
}

// ── 總覽 ──
function renderOverview() {
  const m = DATA.monthly;
  const latest = m[m.length - 1] || {};
  const totalIncome = m.reduce((s, r) => s + r.totalIncome, 0);
  const totalExpenses = m.reduce((s, r) => s + r.totalExpenses, 0);
  const totalNet = m.reduce((s, r) => s + r.monthlyNet, 0);
  const stockTotal = DATA.stocks.reduce((s, st) => s + st.marketValue, 0);

  const grandTotal = totalNet + stockTotal;
  document.getElementById('heroStats').innerHTML = `
    <div><div class="hero-label">基金總額</div><div class="hero-val" style="color:${totalNet >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtNT(totalNet)}</div></div>
    <div><div class="hero-label">股票市值</div><div class="hero-val" style="color:var(--accent2)">${fmtNT(stockTotal)}</div></div>
    <div><div class="hero-label">總資產</div><div class="hero-val" style="color:var(--accent)">${fmtNT(grandTotal)}</div></div>
  `;

  // Monthly trend chart
  const labels = m.map(r => r.name);
  const incData = m.map(r => r.totalIncome);
  const expData = m.map(r => r.totalExpenses);
  const netData = m.map(r => r.monthlyNet);

  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '收入', data: incData, backgroundColor: 'rgba(106,176,112,.6)', borderRadius: 4 },
        { label: '支出', data: expData, backgroundColor: 'rgba(224,107,122,.6)', borderRadius: 4 },
        { label: '淨額', data: netData, type: 'line', borderColor: '#e8845a', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 3, tension: .3 }
      ]
    },
    options: chartOpts('NT$')
  });

  // Cumulative chart
  let cum = 0;
  const cumData = m.map(r => { cum += r.monthlyNet; return cum; });
  if (charts.cum) charts.cum.destroy();
  charts.cum = new Chart(document.getElementById('cumChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '累積餘額', data: cumData,
        borderColor: '#e8845a', backgroundColor: 'rgba(232,132,90,.08)',
        borderWidth: 2, pointRadius: 2, tension: .3, fill: true
      }]
    },
    options: chartOpts('NT$')
  });

  // Monthly gauge - find CURRENT month (YYYYMM based on today)
  const now = new Date();
  const curMonthKey = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');
  const curMonth = m.find(r => r.name === curMonthKey) || m[m.length - 1] || {};
  // 收入平均：扣除開帳金額，排除前2高月、排除0月
  const openingByMonth = {};
  DATA.income.filter(e => e.source === '開帳').forEach(e => {
    if (!e.date) return;
    const mk = e.date.slice(0, 4) + e.date.slice(5, 7);
    openingByMonth[mk] = (openingByMonth[mk] || 0) + e.amount;
  });
  const adjIncomes = m.map(r => r.totalIncome - (openingByMonth[r.name] || 0));
  const avgIncome = trimmedAvg(adjIncomes);
  // 支出平均：排除投資類，排除前2高月、排除0月
  const expNoInvest = DATA.expenses.filter(e => e.tag !== '投資');
  const expByMonthId = {};
  expNoInvest.forEach(e => {
    if (!e.monthId) return;
    expByMonthId[e.monthId] = (expByMonthId[e.monthId] || 0) + e.amount;
  });
  const avgExpense = trimmedAvg(Object.values(expByMonthId));
  const curIncome = curMonth.totalIncome || 0;
  // 本月支出也排除投資（用 monthId 對應）
  const curExpense = curMonth.id ? (expByMonthId[curMonth.id] || 0) : 0;
  const incPct = avgIncome > 0 ? Math.round((curIncome / avgIncome) * 100) : 0;
  const expPct = avgExpense > 0 ? Math.round((curExpense / avgExpense) * 100) : 0;

  // Mountain: higher = more income = better. 10 levels of mountain
  const incLevel = Math.min(Math.floor(incPct / 10), 10);

// ── 收入 ──
function renderIncome() {
  const items = DATA.income;
  const total = items.reduce((s, r) => s + r.amount, 0);
  const byTag = groupByTag(items);
  const topTag = Object.entries(byTag).sort((a, b) => b[1] - a[1])[0];
  // 月平均：扣除開帳、排除前2高月、排除0月
  const openByM = {};
  DATA.income.filter(e => e.source === '開帳').forEach(e => {
    if (!e.date) return;
    const mk = e.date.slice(0, 4) + e.date.slice(5, 7);
    openByM[mk] = (openByM[mk] || 0) + e.amount;
  });
  const avg = trimmedAvg(DATA.monthly.map(r => r.totalIncome - (openByM[r.name] || 0)));

  document.getElementById('incomeStats').innerHTML = `
    <div class="stat"><div class="stat-label">總收入</div><div class="stat-val" style="color:var(--green)">${fmtNT(total)}</div></div>
    <div class="stat"><div class="stat-label">月平均</div><div class="stat-val" style="color:var(--accent2)">${fmtNT(avg)}</div></div>
    <div class="stat"><div class="stat-label">最大類別</div><div class="stat-val" style="color:var(--accent);font-size:16px">${topTag ? topTag[0] : '-'}</div></div>
    <div class="stat"><div class="stat-label">筆數</div><div class="stat-val">${items.length}</div></div>
  `;

  // Pie chart with percentage labels
  const tagEntries = Object.entries(byTag).sort((a, b) => b[1] - a[1]);
  if (charts.incTag) charts.incTag.destroy();
  charts.incTag = new Chart(document.getElementById('incomeByTagChart'), {
    type: 'doughnut',
    data: {
      labels: tagEntries.map(e => e[0] || '未分類'),
      datasets: [{ data: tagEntries.map(e => e[1]), backgroundColor: pieColors }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { font: { family: 'DM Mono', size: 11 }, color: '#8a6655' } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = ((ctx.raw / sum) * 100).toFixed(1);
              return ` ${ctx.label}: ${fmtNT(ctx.raw)} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // Monthly bar
  const monthlyInc = {};
  DATA.monthly.forEach(r => { monthlyInc[r.name] = r.totalIncome; });
  const mLabels = Object.keys(monthlyInc).sort();
  if (charts.incMonth) charts.incMonth.destroy();
  charts.incMonth = new Chart(document.getElementById('incomeMonthlyChart'), {
    type: 'bar',
    data: { labels: mLabels, datasets: [{ label: '收入', data: mLabels.map(l => monthlyInc[l]), backgroundColor: 'rgba(106,176,112,.6)', borderRadius: 4 }] },
    options: chartOpts('NT$')
  });

  // ── 本月分類達成率 ──
  const nowInc = new Date();
  const curMK = String(nowInc.getFullYear()) + String(nowInc.getMonth() + 1).padStart(2, '0');
  // 本月各分類金額
  const curMonthItems = items.filter(r => r.date && r.date.slice(0, 4) + r.date.slice(5, 7) === curMK);
  const curByTag = {};
  curMonthItems.forEach(r => { const t = r.tag || '未分類'; curByTag[t] = (curByTag[t] || 0) + r.amount; });
  // 過往每月各分類金額（排除開帳、排除當月）
  const pastItems = items.filter(r => r.date && r.source !== '開帳' && r.date.slice(0, 4) + r.date.slice(5, 7) !== curMK);
  const tagByMonth = {};
  pastItems.forEach(r => {
    const t = r.tag || '未分類';
    const mk = r.date.slice(0, 4) + r.date.slice(5, 7);
    if (!tagByMonth[t]) tagByMonth[t] = {};
    tagByMonth[t][mk] = (tagByMonth[t][mk] || 0) + r.amount;
  });
  // 各分類的 trimmedAvg
  const tagAvgs = {};
  Object.entries(tagByMonth).forEach(([tag, months]) => {
    tagAvgs[tag] = trimmedAvg(Object.values(months));
  });
  // 收集所有出現過的分類
  const allTags = [...new Set([...Object.keys(curByTag), ...Object.keys(tagAvgs)])].filter(t => tagAvgs[t] > 0 || curByTag[t] > 0);
  allTags.sort((a, b) => (curByTag[b] || 0) - (curByTag[a] || 0));

  const progressHTML = allTags.map(tag => {
    const cur = curByTag[tag] || 0;
    const avgT = tagAvgs[tag] || 0;
    const pct = avgT > 0 ? Math.round((cur / avgT) * 100) : (cur > 0 ? 999 : 0);
    const barW = Math.min(pct, 100);
    const color = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--accent3)' : 'var(--text3)';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-family:var(--font-m);font-size:12px;color:var(--text)">${tag}</span>
        <span style="font-family:var(--font-m);font-size:11px;color:var(--text2)">${fmtNT(cur)} / ${fmtNT(avgT)} <span style="color:${color};font-weight:600">${pct}%</span></span>
      </div>
      <div style="background:var(--bg3);border-radius:6px;height:8px;overflow:hidden">
        <div style="width:${barW}%;height:100%;background:${color};border-radius:6px;transition:width .5s"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('incomeCategoryProgress').innerHTML = `
    <div class="sec">本月分類達成率（vs 月平均，排除前2高月）</div>
    ${progressHTML || '<div style="color:var(--text3);font-size:12px;font-family:var(--font-m)">本月尚無收入紀錄</div>'}
  `;

  // Table
  const sorted = [...items].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  document.getElementById('incomeTable').innerHTML = `
    <thead><tr><th>日期</th><th>來源</th><th>分類</th><th class="right">金額</th></tr></thead>
    <tbody>${sorted.map(r => `<tr><td>${r.date || '-'}</td><td>${r.source}</td><td><span class="tag tag-income">${r.tag || '-'}</span></td><td class="right" style="color:var(--green)">${fmtNT(r.amount)}</td></tr>`).join('')}</tbody>
  `;
}

function runSimulation() {
  const stocks = DATA.stocks;
  const goal = (+document.getElementById('sim-goal').value || 500) * 10000;
  const yrs = +document.getElementById('sim-yrs').value || 10;
  const cashSave = +document.getElementById('sim-save').value || 0;
  const initCash = +document.getElementById('sim-cash').value || 0;

  const stockParams = stocks.map((s, i) => ({
    initVal: s.marketValue || 0,
    monthlyAdd: +document.getElementById(`sim-add-${i}`)?.value || 0,
    growthRate: (+document.getElementById(`sim-gr-${i}`)?.value || 0) / 100,
    divRate: (+document.getElementById(`sim-dr-${i}`)?.value || 0) / 100,
    divToCash: +document.getElementById(`sim-dtc-${i}`)?.value === 1,
    name: s.name,
  }));

  function simStock(months, p) {
    let val = p.initVal, cumDiv = 0, cashFromDiv = 0;
    const md = p.divRate / 12, mg = p.growthRate / 12;
    const result = [{ mo: 0, val, monthlyDiv: val * md, cumDiv, cashFromDiv }];
    for (let m = 1; m <= months; m++) {
      const div = val * md;
      cumDiv += div;
      if (p.divToCash) { cashFromDiv += div; val = val * (1 + mg) + p.monthlyAdd; }
      else { val = val * (1 + mg) + div + p.monthlyAdd; }
      result.push({ mo: m, val, monthlyDiv: val * md, cumDiv, cashFromDiv });
    }
    return result;
  }

  const mos = yrs * 12;
  const allSim = stockParams.map(p => simStock(mos, p));

  const timeline = [];
  for (let mo = 0; mo <= mos; mo++) {
    const stockTotal = allSim.reduce((s, d) => s + d[mo].val, 0);
    const divMonthly = allSim.reduce((s, d) => s + d[mo].monthlyDiv, 0);
    const divCum = allSim.reduce((s, d) => s + d[mo].cumDiv, 0);
    const strcCash = allSim.reduce((s, d) => s + d[mo].cashFromDiv, 0);
    const cash = initCash + cashSave * mo + strcCash;
    timeline.push({ mo, stockTotal, divMonthly, divCum, cash, total: stockTotal + cash });
  }

  const final = timeline[mos];

  // Hero
  document.getElementById('simHero').style.display = '';
  document.getElementById('simHero').innerHTML = `
    <div class="hero-grid" style="grid-template-columns:repeat(4,1fr)">
      <div><div class="hero-label">${yrs}年後總財富</div><div class="hero-val" style="color:var(--accent)">${fmtNT(final.total)}</div></div>
      <div><div class="hero-label">存股市值</div><div class="hero-val" style="color:var(--accent2)">${fmtNT(final.stockTotal)}</div></div>
      <div><div class="hero-label">每月配息</div><div class="hero-val" style="color:var(--accent3)">${fmtNT(final.divMonthly)}</div></div>
      <div><div class="hero-label">現金</div><div class="hero-val">${fmtNT(final.cash)}</div></div>
    </div>
    <div style="text-align:center;margin-top:12px;font-family:var(--font-m);font-size:12px;color:var(--text2)">
      ${final.total >= goal
        ? `已達標！預計 ${fmtNT(final.total)} 超過目標 ${fmtNT(goal)}`
        : `距離目標 ${fmtNT(goal)} 還差 ${fmtNT(goal - final.total)}`}
    </div>
  `;

  // Chart
  document.getElementById('simChartWrap').style.display = '';
  const yrPts = timeline.filter(d => d.mo % 12 === 0);
  simData = { yrPts, goal, labels: yrPts.map(d => d.mo === 0 ? '現在' : `+${d.mo/12}年`) };
  renderSimChart(simView);

  // Breakdown
  document.getElementById('simBreakdown').style.display = '';
  const COLORS_HEX = ['#e8845a','#5b9bd5','#e8a23a','#e06b7a','#7cb87c','#9b7ec8'];
  document.getElementById('simTable').innerHTML = `
    <thead><tr><th>股票</th><th class="right">現值</th><th class="right">月投入</th><th class="right">${yrs}年後市值</th><th class="right">月配息</th></tr></thead>
    <tbody>
    ${stockParams.map((p, i) => `<tr>
      <td style="color:${COLORS_HEX[i%6]}">${p.name}</td>
      <td class="right">${fmtNT(p.initVal)}</td>
      <td class="right">${fmtNT(p.monthlyAdd)}/月</td>
      <td class="right">${fmtNT(allSim[i][mos].val)}</td>
      <td class="right" style="color:var(--accent3)">${fmtNT(allSim[i][mos].monthlyDiv)}</td>
    </tr>`).join('')}
    <tr><td>現金</td><td class="right">${fmtNT(initCash)}</td><td class="right">${fmtNT(cashSave)}/月</td><td class="right">${fmtNT(final.cash)}</td><td class="right">-</td></tr>
    </tbody>
    <tfoot><tr><td>合計</td><td class="right">${fmtNT(stockParams.reduce((s,p)=>s+p.initVal,0)+initCash)}</td><td class="right">${fmtNT(stockParams.reduce((s,p)=>s+p.monthlyAdd,0)+cashSave)}/月</td><td class="right" style="color:var(--accent)">${fmtNT(final.total)}</td><td class="right" style="color:var(--accent3)">${fmtNT(final.divMonthly)}</td></tr></tfoot>
  `;
}

function renderSimChart(view) {
  const { yrPts, goal, labels } = simData;
  if (!yrPts) return;
  const fld = view === 'stock' ? 'stockTotal' : view === 'divMonthly' ? 'divMonthly' : view === 'cash' ? 'cash' : 'total';
  if (simChartInst) simChartInst.destroy();
  simChartInst = new Chart(document.getElementById('simChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '預測', data: yrPts.map(d => Math.round(d[fld])), borderColor: '#e8845a', backgroundColor: 'rgba(232,132,90,.08)', borderWidth: 2.5, pointRadius: 2, tension: .4, fill: true },
        ...(view === 'total' ? [{ label: '目標', data: Array(labels.length).fill(goal), borderColor: 'rgba(224,107,122,.5)', borderWidth: 1, pointRadius: 0, borderDash: [6,4], backgroundColor: 'transparent' }] : []),
      ]
    },
    options: chartOpts('NT$')
  });
}

function setSimView(v, e) {
  simView = v;
  e.target.parentElement.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  renderSimChart(v);
}

// ── 共用 ──
const pieColors = ['#e8845a','#5b9bd5','#e8a23a','#e06b7a','#6ab070','#9b7ec8','#f5c842','#ff8fa3','#7cb87c','#c4556a','#b89485','#ffaa70'];

function groupByTag(items) {
  const map = {};
  items.forEach(r => {
    const t = r.tag || '未分類';
    map[t] = (map[t] || 0) + r.amount;
  });
  return map;
}

function chartOpts(prefix) {
  return {
    responsive: true, maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { color: '#8a6655', font: { family: 'DM Mono', size: 11 }, boxWidth: 14, padding: 10 } },
      tooltip: {
        backgroundColor: '#fff8f3', borderColor: '#f0d9cc', borderWidth: 1,
        titleColor: '#8a6655', bodyColor: '#3d2b1f',
        titleFont: { family: 'DM Mono', size: 11 }, bodyFont: { family: 'DM Mono', size: 12 },
        callbacks: { label: c => ` ${c.dataset.label}: ${prefix}${Math.round(c.raw).toLocaleString('zh-TW')}` }
      }
    },
    scales: {
      x: { grid: { color: 'rgba(240,217,204,.6)' }, ticks: { color: '#b89485', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 12 } },
      y: { grid: { color: 'rgba(240,217,204,.6)' }, ticks: { color: '#b89485', font: { family: 'DM Mono', size: 10 },
        callback: v => v >= 1000000 ? (v/10000).toFixed(0)+'萬' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v } }
    }
  };
}

// ── 啟動 ──
syncAll();
</script>
</body>
</html>
